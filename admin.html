<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 등록</title>

<style>


*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#111;
  color:#fff;
}

header{
  width:100%;
  height:90px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 50px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
  text-decoration:none;
}

.logo-text span{
  color:#d60000;
}

@media(max-width:768px){

  header{
    padding:0 20px;
  }

  .company-logo{
    height:44px;
  }

  .logo-text{
    font-size:26px;
  }

}


.container{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:40px;
}

.home-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:54px;
  padding:0 26px;
  border-radius:14px;
  background:#d60000;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  margin-bottom:40px;
}

h1{
  font-size:48px;
  margin-bottom:40px;
}

h1 span{
  color:#ff2a2a;
}

.input-group{
  margin-bottom:24px;
}

label{
  display:block;
  margin-bottom:12px;
  font-weight:700;
}

input,
select,
textarea{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:18px;
  color:#fff;
  font-size:15px;
  outline:none;
}

textarea{
  min-height:140px;
}

.preview-list{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:18px;
}

.preview-image{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
}

button{
  width:100%;
  height:64px;
  border:none;
  border-radius:16px;
  background:#d60000;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

</style>
</head>
<body>


<header>

  <div class="header-left">

    <img
      src="tiretech-logo.png"
      alt="타이어테크 로고"
      class="company-logo"
    >

    <a href="index.html" class="logo-text">
      WORK<span>BOARD</span>
    </a>

  </div>

</header>


<div class="container">

  <a href="index.html" class="home-btn">
    홈으로 가기
  </a>

  <div class="card">

    <h1>
      <span>업무 등록</span>
    </h1>

    <div class="input-group">
      <label>업무 날짜</label>
      <input type="date" id="date">
    </div>

    <div class="input-group">
      <label>업무 구분</label>
      <select id="category">
        <option>마케팅</option>
        <option>블로그</option>
        <option>플레이스</option>
        <option>광고</option>
        <option>디자인</option>
      </select>
    </div>

    <div class="input-group">
      <label>업체명</label>
      <input type="text" id="company">
    </div>

    <div class="input-group">
      <label>업무 내용</label>
      <input type="text" id="title">
    </div>

    <div class="input-group">
      <label>상태</label>
      <select id="status">
        <option value="progress">진행중</option>
        <option value="done">완료</option>
      </select>
    </div>

    <div class="input-group">
      <label>메모</label>
      <textarea id="memo"></textarea>
    </div>

    <div class="input-group">

      <label>업무 이미지 업로드</label>

      <input
        type="file"
        id="imageInput"
        accept="image/*"
        multiple
      >

      <div id="previewList" class="preview-list"></div>

    </div>

    <button onclick="saveWork()">
      업무 저장
    </button>

  </div>

</div>

<script>

let imageList = [];

document
.getElementById('imageInput')
.addEventListener('change', function(e){

  const files = Array.from(e.target.files);

  const previewList =
  document.getElementById('previewList');

  previewList.innerHTML = '';

  imageList = [];

  files.forEach(file => {

    const reader = new FileReader();

    reader.onload = function(event){

      imageList.push(event.target.result);

      const img =
      document.createElement('img');

      img.src = event.target.result;

      img.className = 'preview-image';

      previewList.appendChild(img);

    }

    reader.readAsDataURL(file);

  });

});

function saveWork(){

  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  const company = document.getElementById('company').value;
  const title = document.getElementById('title').value;
  const status = document.getElementById('status').value;
  const memo = document.getElementById('memo').value;

  if(!date || !title){
    alert('날짜와 업무내용을 입력해주세요.');
    return;
  }

  let data =
  JSON.parse(localStorage.getItem('tiretechWorkData')) || {};

  if(!data[date]){
    data[date] = [];
  }

  data[date].push({
    category,
    company,
    title,
    status,
    memo,
    images:imageList
  });

  localStorage.setItem(
    'tiretechWorkData',
    JSON.stringify(data)
  );

  alert('업무가 저장되었습니다.');

}

</script>

</body>
</html>
