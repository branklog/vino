<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비노파라다이스 관리자</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand-color: #9D8A69; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Pretendard', sans-serif; }
       body {
    background:#120f0d;
    color:#fff;
    padding-bottom:50px;
}
        header { height:90px; background:#f5f1eb; display:flex; align-items:center; padding:0 40px; margin-bottom:30px; }
        .header-left { display:flex; align-items:center; gap:18px; }
        .company-logo { height:22px; }
        .logo-text { font-size:18px; font-weight:900; color:var(--brand-color); text-decoration:none; }
        .container { max-width:1100px; margin:auto; padding:0 20px; }
        .home-btn { display:inline-block; padding:12px 24px; border-radius:14px; background:var(--brand-color); color:#fff; text-decoration:none; font-weight:800; margin-bottom:24px; }
        .card { background:#1c1a18; padding:30px; border-radius:24px; margin-bottom:30px; }
        .group { margin-bottom:22px; }
        label { display:block; margin-bottom:10px; font-weight:700; }
        input, select { width:100%; padding:18px; background:#2a1d1d; border:1px solid rgba(255,255,255,.08); border-radius:14px; color:#fff; }
        .btn-wrap { display: flex; gap: 10px; margin-top: 20px; }
        .main-btn { padding:15px 20px; border-radius:12px; border:none; cursor:pointer; font-weight:800; background:var(--brand-color); color:#fff; font-size:14px; }
        .task-item { background:#1c1a18; padding:20px; border-radius:18px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
        .task-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        #file-preview { display:none; width:100px; height:100px; border-radius:10px; object-fit:cover; margin-top:10px; border:1px solid #555; }
    </style>
</head>
<body>
<div id="login-box" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#120f0d;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

    <div style="
    background:#1c1a18;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    border:1px solid #333;
    ">

        <h2 style="
        margin-bottom:20px;
        color:#9D8A69;
        text-align:center;
        ">
            관리자 로그인
        </h2>

        <input
            type="password"
            id="admin-password"
            placeholder="비밀번호 입력"
            style="
            width:100%;
            padding:15px;
            margin-bottom:15px;
            ">

        <button
            onclick="checkLogin()"
            class="main-btn"
            style="width:100%;">

            로그인

        </button>

    </div>

</div>








    
<header>
  <div class="header-left">
    <img src="logo.png" class="company-logo">
    <a href="index.html" class="logo-text">WORK BOARD</a>
  </div>
</header>
<div class="container">
    <a href="index.html" class="home-btn">← 홈으로 가기</a>
<button
    class="home-btn"
    onclick="logout()"
    style="
    border:none;
    cursor:pointer;
    margin-left:10px;
    background:#6b5b45;
    ">

    로그아웃

</button>
    
    
    <div class="card" style="padding:20px; border:2px dashed var(--brand-color);">
        <input type="file" id="excel-file" accept=".xlsx, .xls" style="display:none;" onchange="uploadExcel(event)">
        <button class="main-btn" style="background:var(--brand-color); width:100%;" onclick="document.getElementById('excel-file').click()">📊 엑셀 파일 선택하여 목록 자동 만들기</button>
    </div>

    <div class="card">
        <input type="hidden" id="edit-id">
        <input type="hidden" id="current-image-url">
        <div class="group"><label>의뢰날짜</label><input type="date" id="req-date"></div>
        <div class="group">

    <label>완료날짜</label>

    <input type="date" id="complete-date">

</div>
        <div class="group"><label>업무구분</label><select id="cat"><option>웹</option><option>인쇄</option></select></div>
        <div class="group"><label>작업내용</label><input type="text" id="title"></div>
        <div class="group"><label>메모</label><input type="text" id="memo"></div>
        <div class="group">
    <label>진행상태</label>

    <select id="status">

        <option value="progress">진행중</option>
        <option value="done">완료</option>
        <option value="pending">미완료</option>

    </select>
</div>
        <div class="group">
            <label>이미지 업로드</label>
            <input
type="file"
id="task-file"
multiple
style="background:transparent;">
<div
id="file-preview"
style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
align-items:flex-start;
">
</div>
        </div>
        <div class="btn-wrap">
            <button class="main-btn" onclick="resetForm()">+ 새로 입력하기</button>
            <button class="main-btn" id="save-btn" onclick="saveData()">업무 저장</button>
        </div>
    </div>
    <div id="taskList"></div>
</div>

<script>



    
const client = supabase.createClient('https://ttunieohxvnhwiikxfzu.supabase.co', 'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP');

let excelTempData = []; 

// 엑셀 업로드 시 날짜 변환 핵심
async function uploadExcel(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        excelTempData = [];
        const list = document.getElementById('taskList');
        list.innerHTML = '<h3 style="margin-bottom:15px; color:var(--brand-color);">📊 엑셀 미리보기 (아직 저장 안 됨!)</h3>';
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[2]) continue;
            let d = row[0];
            if (typeof d === 'number') {
                const dateObj = XLSX.SSF.parse_date_code(d);
                d = `${dateObj.y}-${String(dateObj.m).padStart(2,'0')}-${String(dateObj.d).padStart(2,'0')}`;
            }
  excelTempData.push({
    request_date: d,
    category: row[1],
    title: row[2],
    memo: "",
    status: "done"
});
            list.innerHTML += `<div class="task-item" style="border: 1px solid var(--brand-color);"><div><strong>${row[2]}</strong> (${row[1]})<br><small>의뢰일: ${d}</small></div></div>`;
        }
    };
    reader.readAsArrayBuffer(file);
}

// 이미지 미리보기
let selectedFiles = [];

document.getElementById('task-file')
.addEventListener('change', function(){

  selectedFiles = [
    ...selectedFiles,
    ...this.files
];

this.value = '';

    renderPreview();

});

function renderPreview(){

    const preview =
        document.getElementById('file-preview');

    preview.innerHTML = '';

    selectedFiles.forEach((file, index)=>{

        const reader = new FileReader();

        reader.onload = function(e){

            preview.innerHTML += `
          <div style="
position:relative;
width:90px;
height:90px;
flex:none;
overflow:hidden;
border-radius:12px;
">
                <img
                src="${e.target.result}"
                style="
                width:100%;
                height:100%;
                object-fit:cover;
                border-radius:10px;
                border:1px solid #555;
                ">

                <button
                onclick="removeImage(${index})"
                style="
                position:absolute;
                top:-8px;
                right:-8px;
                width:24px;
                height:24px;
                border:none;
                border-radius:50%;
                background:#ff4d4f;
                color:#fff;
                font-weight:bold;
                cursor:pointer;
                ">
                ×
                </button>

            </div>
            `;
        }

        reader.readAsDataURL(file);

    });

}

function removeImage(index){

    selectedFiles.splice(index,1);

    document.getElementById('task-file').value = '';

    renderPreview();

}
async function saveData() {
    // 1. 입력창 데이터 가져오기
    const editId = document.getElementById('edit-id').value;
    const reqDate = document.getElementById('req-date').value;
    const completeDate =
    document.getElementById('complete-date').value;
    const cat = document.getElementById('cat').value;
    const title = document.getElementById('title').value;
    const memo =
    document.getElementById('memo').value;
const status =
    document.getElementById('status').value;
 let imageUrls = [];

    // 2. 실제 이미지 업로드 로직 (사장님이 주신 코드 적용)
for(const file of selectedFiles){

    const fileName =
        `${Date.now()}_${file.name}`;

    const { error } =
        await client.storage
        .from('tasks_images')
        .upload(fileName, file);

    if(error){

        alert("업로드 실패");
        return;

    }

    const imageUrl =
        client.storage
        .from('tasks_images')
        .getPublicUrl(fileName)
        .data.publicUrl;

    imageUrls.push(imageUrl);

}


    // 3. 수파베이스에 저장할 데이터 객체
    const taskData = {
        complete_date: completeDate,
        request_date: reqDate,
        category: cat,
        title: title,
memo: memo,
status: status,
tasks_images: imageUrls
    };

    // 4. 수정(update) 또는 신규 저장(insert) 실행
    if (editId) {
        await client.from('tasks_new').update(taskData).eq('id', editId);
    } else {
        await client.from('tasks_new').insert([taskData]);
    }

    // 5. 엑셀 대기 데이터 저장
  if (typeof excelTempData !== 'undefined' && excelTempData.length > 0) {
    await client.from('tasks_new').insert(excelTempData);
    excelTempData = [];
}

alert("저장되었습니다!");
resetForm();
loadList();

}
async function checkLogin(){



    const password =
        document.getElementById('admin-password')
        .value;

    const { data, error } =
        await client.auth.signInWithPassword({

            email: "ellyhee77@gmail.com",
            password: password

        });

    if(error){

        alert("로그인 실패");
        return;

    }

    document.getElementById('login-box')
    .style.display = 'none';
loadList();
}

async function loadList() {
    const { data } = await client.from('tasks_new').select('*').order('request_date', {ascending: false});
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    if(data) data.forEach(t => {
        list.innerHTML += `<div class="task-item">
            <div style="display:flex; align-items:center;">
            ${Array.isArray(t.tasks_images) && t.tasks_images.length
? `<img src="${t.tasks_images[0]}" class="task-img">`
: ''}
                <div><strong>${t.title}</strong> (${t.category})<br><small style="color:#aaa;">메모: ${t.memo || '없음'}</small></div>
            </div>
            <div style="display:flex; gap:5px;">
                <button class="main-btn" style="background:#7A8B5B; padding:8px 15px;" onclick='editMode(${JSON.stringify(t)})'>수정</button>
                <button class="main-btn" style="background:#8a7758; padding:8px 15px;" onclick="deleteTask(${t.id})">삭제</button>
            </div>
        </div>`;
    });
}
function resetForm() {

    document.getElementById('edit-id').value = "";

    document.getElementById('current-image-url').value = "";

    document.getElementById('save-btn').innerText =
    "업무 저장";

    document.getElementById('title').value = "";

    document.getElementById('memo').value = "";

    document.getElementById('task-file').value = "";

    document.getElementById('file-preview').innerHTML = '';

    selectedFiles = [];

}
function editMode(t) { document.getElementById('edit-id').value = t.id; document.getElementById('req-date').value = t.request_date; document.getElementById('complete-date').value =
    t.complete_date || "";document.getElementById('cat').value = t.category; document.getElementById('status').value =
    t.status || 'progress';document.getElementById('title').value = t.title; document.getElementById('memo').value = t.memo || ""; document.getElementById('current-image-url').value = t.tasks_images || ""; document.getElementById('save-btn').innerText = "수정하기"; selectedFiles = [];

const preview =
document.getElementById('file-preview');

preview.innerHTML = '';

if(Array.isArray(t.tasks_images)){

    t.tasks_images.forEach(img=>{

        preview.innerHTML += `
        <img
        src="${img}"
        style="
        width:90px;
        height:90px;
        object-fit:cover;
        border-radius:10px;
        border:1px solid #555;
        ">
        `;
    });

} }
async function deleteTask(id) { await client.from('tasks_new').delete().eq('id', id); loadList(); }
checkSession();


async function checkSession(){

    const { data } =
        await client.auth.getSession();

    if(data.session){

        document.getElementById('login-box')
        .style.display = 'none';

    }

    loadList();

}

async function logout(){

    await client.auth.signOut();

    location.reload();

}


    
</script>
</body>
</html>
