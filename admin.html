<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>업무등록</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Pretendard,sans-serif}
body{background:#4310a5;color:#fff}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px}
.header-left{display:flex;align-items:center;gap:18px}
.company-logo{height:54px}
.logo-text{font-size:34px;font-weight:900;color:#6d1bb8;text-decoration:none}
.logo-text span{color:#ff4fa0}
.container{max-width:1000px;margin:auto;padding:80px 20px}
.card{background:rgba(255,255,255,.08);padding:40px;border-radius:24px}
.group{margin-bottom:20px}
input,textarea,select{width:100%;background:rgba(255,255,255,.12);border:none;border-radius:14px;padding:16px;color:#fff}
button{height:56px;border:none;border-radius:14px;background:#ff4fa0;color:#fff;font-weight:800;padding:0 22px}
.task{background:rgba(255,255,255,.06);padding:18px;border-radius:16px;margin-bottom:18px}
.preview-list{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.preview-image{width:90px;height:90px;object-fit:cover;border-radius:12px}
</style></head><body>
<header><div class="header-left"><img src="tiretech-logo.png" class="company-logo"><a href="index.html" class="logo-text">WORK<span>BOARD</span></a></div></header>

<div class="container">
<a href="index.html" style="display:inline-flex;background:#ff4fa0;padding:14px 24px;border-radius:14px;color:#fff;text-decoration:none;margin-bottom:24px">홈으로 가기</a>

<div class="card">
<div class="group"><input type="date" id="date"></div>
<div id="tasks"></div>
<button onclick="addTask()">+ 업무 추가</button>
<button onclick="saveAll()" style="width:100%;margin-top:14px">저장</button>
</div>
</div>

<script>

const DB_NAME='WORKBOARD_DB';
const STORE_NAME='tasks';

function openDB(){
return new Promise((resolve,reject)=>{
const request=indexedDB.open(DB_NAME,1);

request.onupgradeneeded=function(e){
const db=e.target.result;
if(!db.objectStoreNames.contains(STORE_NAME)){
db.createObjectStore(STORE_NAME,{keyPath:'id',autoIncrement:true});
}
}

request.onsuccess=()=>resolve(request.result);
request.onerror=()=>reject(request.error);
});
}

async function saveTask(task){
const db=await openDB();
const tx=db.transaction(STORE_NAME,'readwrite');
tx.objectStore(STORE_NAME).add(task);
}

async function getAllTasks(){
const db=await openDB();

return new Promise((resolve,reject)=>{
const tx=db.transaction(STORE_NAME,'readonly');
const store=tx.objectStore(STORE_NAME);
const request=store.getAll();

request.onsuccess=()=>resolve(request.result);
request.onerror=()=>reject(request.error);
});
}


function addTask(){
const div=document.createElement('div');
div.className='task';
div.innerHTML=`
<input class="title" placeholder="업무내용"><br><br>
<select class="status">
<option value="done">완료</option>
<option value="progress">진행중</option>
<option value="pending">미완료</option>
</select><br><br>
<textarea class="memo" placeholder="메모"></textarea><br><br>
<input type="file" class="images" multiple accept="image/*">
<div class="preview-list"></div>
`;

document.getElementById('tasks').appendChild(div);

const input=div.querySelector('.images');
const preview=div.querySelector('.preview-list');

input.addEventListener('change',function(e){
preview.innerHTML='';
Array.from(e.target.files).forEach(file=>{
const reader=new FileReader();
reader.onload=function(ev){
const img=document.createElement('img');
img.src=ev.target.result;
img.className='preview-image';
preview.appendChild(img);
}
reader.readAsDataURL(file);
});
});
}

addTask();

async function saveAll(){
const date=document.getElementById('date').value;
if(!date)return alert('날짜 선택');

const items=document.querySelectorAll('.task');

for(const item of items){
const files=Array.from(item.querySelector('.images').files);
const images=[];

for(const file of files){
images.push(await toBase64(file));
}

await saveTask({
date,
title:item.querySelector('.title').value,
status:item.querySelector('.status').value,
memo:item.querySelector('.memo').value,
images
});
}

alert('저장완료');
}

function toBase64(file){
return new Promise((resolve,reject)=>{
const reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.onerror=reject;
reader.readAsDataURL(file);
});
}
</script></body></html>
