<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비노파라다이스 WORKBOARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Pretendard,sans-serif}
body{
    background:#120f0d;
    color:#fff;
}
header{height:90px;background:#f5f1eb;display:flex;align-items:center;padding:0 40px}
.header-left{display:flex;align-items:center;gap:18px}
.company-logo{height:30px}
.logo-text{font-size:22px;font-weight:900;color:#111;text-decoration:none}
.logo-text span{color:#9D8A69}
.hero{
    min-height:calc(100vh - 90px);
    background:
    linear-gradient(
        rgba(18,15,13,.75),
        rgba(18,15,13,.75)
    ),
    url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop');
    background-size:cover;
}
.container{max-width:1200px;margin:auto;padding:120px 20px}
.box{background:#1c1a18;padding:28px;border-radius:24px;margin-bottom:24px}
.box h2{font-size:24px;font-weight:700}
.row{display:flex;gap:12px;margin-top:14px}
input{flex:1;width:100%;height:60px;border:none;border-radius:14px;padding:0 18px;background:#2a1d1d;color:#fff;font-size:16px;outline:none}
button{width:180px;height:60px;border:none;border-radius:14px;background:#9D8A69;color:#fff;font-weight:800;font-size:16px;cursor:pointer}
button:hover{background:#7d6c4e}

/* 모바일 화면 조정 */
@media(max-width:768px){
    header{height:60px; padding:0 15px;}
    .company-logo{height:16px;}
    .logo-text{font-size:14px;}
    .container{padding:40px 15px;}
    .row{gap:10px}
    input{height:48px;font-size:14px}
    button{width:100px;height:48px;font-size:14px}
    .hero h1 { font-size: 32px !important; line-height: 1.2; }
}
</style>
</head>
<body>
<header><div class="header-left"><img src="dagil-logo.png" class="company-logo"><a href="index.html" class="logo-text">비노파라다이스 <span>WORKBOARD</span></a></div></header>
<section class="hero"><div class="container">
    <h1 style="font-size:64px;margin-bottom:20px">비노파라다이스 WORKBOARD</h1>

    <div class="box"><h2>일별 조회</h2><div class="row"><input type="date" id="day"><button onclick="go('day', 'day')">조회</button></div></div>
    <div class="box"><h2>월별 조회</h2><div class="row"><input type="month" id="month"><button onclick="go('month', 'month')">조회</button></div></div>
    <div class="box"><h2>년도별 조회</h2><div class="row"><input
    type="number"
    id="year"
    placeholder="2026"
    min="2000"
    max="9999"
    oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)"><button onclick="go('year', 'year')">조회</button></div></div>
</div></section>

<script>
function go(mode, id){
    const val = document.getElementById(id).value;
    if(!val) return alert('값을 입력하세요.');
    location.href = 'result.html?mode='+mode+'&value='+val;
}
</script>
</body>
</html>
