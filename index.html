<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타이어테크 효자점 마케팅 관리 시스템</title>

<style>


*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#111;
  color:#fff;
}

header{
  width:100%;
  height:90px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 50px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
  text-decoration:none;
}

.logo-text span{
  color:#d60000;
}

@media(max-width:768px){

  header{
    padding:0 20px;
  }

  .company-logo{
    height:44px;
  }

  .logo-text{
    font-size:26px;
  }

}


body{
  overflow-x:hidden;
}

.hero{

  width:100%;
  min-height:calc(100vh - 90px);

  background:
  linear-gradient(
    rgba(0,0,0,0.62),
    rgba(0,0,0,0.62)
  ),
  url('https://images.unsplash.com/photo-1486262715619-67b85e0b08d3?q=80&w=1920&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

}

.content{
  max-width:1200px;
  margin:auto;
  padding:140px 20px;
}

.sub-text{
  font-size:22px;
  margin-bottom:18px;
}

.main-title{
  font-size:68px;
  line-height:1.25;
  font-weight:900;
  margin-bottom:28px;
}

.main-title span{
  color:#ff2a2a;
}

.desc{
  font-size:20px;
  line-height:1.9;
  color:#f1f1f1;
  max-width:850px;
  margin-bottom:48px;
}

.search-wrap{
  display:flex;
  gap:14px;
  max-width:760px;
}

.search-wrap input{
  flex:1;
  height:72px;
  border:none;
  border-radius:16px;
  padding:0 24px;
  font-size:17px;
  background:rgba(255,255,255,0.14);
  color:#fff;
  outline:none;
}

.search-wrap input::-webkit-calendar-picker-indicator{
  filter:invert(1);
}

.search-wrap button{
  width:220px;
  border:none;
  border-radius:16px;
  background:#d60000;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

@media(max-width:768px){
  .content{
    padding:90px 20px;
  }

  .main-title{
    font-size:42px;
  }

  .desc{
    font-size:16px;
  }

  .search-wrap{
    flex-direction:column;
  }

  .search-wrap button{
    width:100%;
    height:68px;
  }
}

</style>
</head>
<body>


<header>

  <div class="header-left">

    <img
      src="tiretech-logo.png"
      alt="타이어테크 로고"
      class="company-logo"
    >

    <a href="index.html" class="logo-text">
      WORK<span>BOARD</span>
    </a>

  </div>

</header>


<section class="hero">

  <div class="content">

    <div class="sub-text">
      타이어테크 효자점 마케팅 관리 시스템
    </div>

    <div class="main-title">
      <span>날짜별 업무 조회 시스템</span><br>
      실시간 업무 진행 현황 관리
    </div>

    <div class="desc">
      날짜를 선택하면 해당 날짜의
      블로그 · 플레이스 · 광고 · 마케팅
      업무 진행 현황을 확인할 수 있습니다.
    </div>

    <div class="search-wrap">

      <input
        type="date"
        id="dateInput"
      >

      <button onclick="searchDate()">
        업무 조회
      </button>

    </div>

  </div>

</section>

<script>

function searchDate(){

  const date = document
    .getElementById('dateInput')
    .value
    .trim();

  if(!date){
    alert('날짜를 선택해주세요.');
    return;
  }

  window.location.href =
  'result.html?date=' + encodeURIComponent(date);

}

</script>

</body>
</html>
