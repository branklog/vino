<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>타이어테크 효자점 마케팅 관리 시스템</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#f5f5f7;
  color:#fff;
  overflow-x:hidden;
}

header{
  width:100%;
  background:#ffffff;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ececec;
}

.logo{
  font-size:34px;
  font-weight:900;
  color:#7d1aa8;
}

.logo span{
  color:#ff4fa0;
}

.tire-logo{
  height:42px;
}

.hero{
  width:100%;
  min-height:calc(100vh - 90px);
  background:linear-gradient(135deg,#7b179e 0%,#5d1390 45%,#3712c5 100%);
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:'';
  position:absolute;
  width:1200px;
  height:1200px;
  right:-350px;
  top:-250px;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,0.08),rgba(255,255,255,0.08) 12px,transparent 12px,transparent 24px);
  transform:rotate(15deg);
}

.content{
  max-width:1200px;
  margin:auto;
  padding:130px 20px;
  position:relative;
  z-index:2;
}

.sub-text{
  font-size:22px;
  font-weight:600;
  margin-bottom:10px;
  color:#f1dfff;
}

.main-title{
  font-size:58px;
  line-height:1.3;
  font-weight:900;
  margin-bottom:26px;
}

.main-title span{
  color:#ff71b6;
}

.desc{
  font-size:19px;
  line-height:1.9;
  color:#f1dfff;
  margin-bottom:45px;
  max-width:850px;
}

.search-wrap{
  display:flex;
  gap:14px;
  max-width:760px;
}

.search-wrap input{
  flex:1;
  height:70px;
  border:none;
  border-radius:18px;
  padding:0 24px;
  font-size:17px;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

.search-wrap input::placeholder{
  color:rgba(255,255,255,0.7);
}

.search-wrap button{
  width:190px;
  border:none;
  border-radius:18px;
  background:#ff4fa0;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

.info-box{
  margin-top:42px;
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.info-card{
  background:rgba(255,255,255,0.12);
  padding:18px 22px;
  border-radius:18px;
  font-size:14px;
}

footer{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,0.6);
  font-size:13px;
}

@media(max-width:768px){

  header{
    padding:20px;
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }

  .content{
    padding:90px 20px;
  }

  .main-title{
    font-size:40px;
  }

  .desc{
    font-size:16px;
  }

  .search-wrap{
    flex-direction:column;
  }

  .search-wrap button{
    width:100%;
    height:68px;
  }
}
</style>
</head>
<body>

<header>

  <div class="logo">
    WORK<span>BOARD</span>
  </div>

  <img
    src="tiretech-logo.png"
    alt="타이어테크 로고"
    class="tire-logo"
  >

</header>

<section class="hero">

  <div class="content">

    <div class="sub-text">
      타이어테크 효자점
    </div>

    <div class="main-title">
      <span>마케팅 관리 시스템</span>
    </div>

    <div class="desc">
      날짜를 검색하면 해당 날짜의
      블로그 관리, 플레이스 운영,
      광고 셋팅, 스토어 운영 및
      디자인 업무 진행 내역을
      한눈에 확인할 수 있습니다.
    </div>

    <div class="search-wrap">

      <input
        type="text"
        id="dateInput"
        placeholder="예시 : 2026-05-18"
      >

      <button onclick="searchDate()">
        업무 조회
      </button>

    </div>

    <div class="info-box">

      <div class="info-card">
        ✔ 업무 진행 및 일정 관리
      </div>

      <div class="info-card">
        ✔ 블로그 · 플레이스 운영 관리
      </div>

      <div class="info-card">
        ✔ 광고 셋팅 및 스토어 운영
      </div>

      <div class="info-card">
        ✔ 디자인 작업 및 요청 기록
      </div>

    </div>

  </div>

  <footer>
    © 2026 TIRETECH MARKETING SYSTEM
  </footer>

</section>

<script>
function searchDate(){

  const date = document
    .getElementById('dateInput')
    .value
    .trim();

  if(!date){
    alert('날짜를 입력해주세요.');
    return;
  }

  window.location.href =
    'result.html?date=' + encodeURIComponent(date);
}
</script>

</body>
</html>
