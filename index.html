<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타이어테크 WORKBOARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:linear-gradient(135deg,#6d1bb8,#4310a5);color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.logo-text{font-size:34px;font-weight:900;color:#6d1bb8;text-decoration:none;}
.logo-text span{color:#ff4fa0;}
.container{max-width:1200px;margin:auto;padding:120px 20px;}
.title{font-size:62px;font-weight:900;line-height:1.2;margin-bottom:20px;}
.title span{color:#ff4fa0;}
.desc{font-size:20px;line-height:1.8;margin-bottom:50px;}
.box{background:rgba(255,255,255,.1);padding:24px;border-radius:24px;margin-bottom:24px;}
.row{display:flex;gap:14px;margin-top:18px;}
input{flex:1;height:64px;border:none;border-radius:14px;padding:0 20px;background:rgba(255,255,255,.14);color:#fff;}
button{width:180px;border:none;border-radius:14px;background:#6d1bb8;color:#fff;font-weight:800;}
</style>
</head>
<body>
<header>
<a href="index.html" class="logo-text">WORK<span>BOARD</span></a>
</header>

<div class="container">
<div class="title"><span>통합 업무 조회</span><br>타이어테크 효자점</div>
<div class="desc">일별 · 월별 · 년도별 업무 조회를 지원합니다.</div>

<div class="box">
<h2>일별 조회</h2>
<div class="row">
<input type="date" id="dayInput">
<button onclick="goDay()">조회</button>
</div>
</div>

<div class="box">
<h2>월별 조회</h2>
<div class="row">
<input type="month" id="monthInput">
<button onclick="goMonth()">조회</button>
</div>
</div>

<div class="box">
<h2>년도별 조회</h2>
<div class="row">
<input type="number" id="yearInput" placeholder="2026">
<button onclick="goYear()">조회</button>
</div>
</div>
</div>

<script>
function goDay(){
const v=document.getElementById('dayInput').value;
if(!v)return alert('날짜 선택');
location.href='result.html?mode=day&value='+v;
}
function goMonth(){
const v=document.getElementById('monthInput').value;
if(!v)return alert('월 선택');
location.href='result.html?mode=month&value='+v;
}
function goYear(){
const v=document.getElementById('yearInput').value;
if(!v)return alert('년도 입력');
location.href='result.html?mode=year&value='+v;
}
</script>
</body>
</html>
