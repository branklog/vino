
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESULT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:linear-gradient(135deg,#6d1bb8,#4310a5);color:#fff;min-height:100vh;}

/* 헤더 디자인 관리자 페이지와 일치화 */
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.header-left{display:flex;align-items:center;gap:18px;}
.company-logo{height:24px;} 
.logo-text{font-size:18px;font-weight:900;color:#ff4fa0;text-decoration:none;} 

.container{max-width:1200px;margin:auto;padding:80px 20px;}
.top-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.top-btn{display:inline-flex;align-items:center;justify-content:center;height:50px;padding:0 20px;border-radius:14px;background:rgba(255,255,255,.12);color:#fff;text-decoration:none;font-weight:700;border:none;cursor:pointer;}
.home-btn{background:#ff4fa0;}
.active{background:#ff4fa0;}
.list-item{display:flex;align-items:center;gap:18px;padding:20px 24px;background:rgba(255,255,255,.08);border-radius:18px;margin-bottom:14px;cursor:pointer;}

/* 결과 없음 전용 스타일 */
.list-item.no-data { cursor: default; justify-content: center; color: #cfcfcf; }
.date{font-size:15px;color:#cfcfcf;min-width:90px;}
.status{font-size:14px;font-weight:800;padding:8px 14px;border-radius:999px;min-width:88px;text-align:center;}
.done{background:#17381f;color:#74ff9f;}
.progress{background:#4b3c13;color:#ffd95b;}
.pending{background:#4b1f1f;color:#ff7b7b;}
.title{font-size:18px;font-weight:700;line-height:1.5;flex:1;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.modal-box{width:100%;max-width:1000px;max-height:90vh;overflow:auto;background:#181818;border-radius:28px;padding:34px;}
.close-btn{height:50px;padding:0 20px;border:none;border-radius:14px;background:#ff4fa0;color:#fff;font-weight:800;margin-bottom:24px;cursor:pointer;}
.modal-title{font-size:26px;font-weight:900;line-height:1.5;margin-bottom:20px;}
.modal-memo{font-size:17px;line-height:2;margin-top:20px;white-space:pre-wrap;}
.modal-images{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px;}
.modal-images img{width:220px;border-radius:18px;cursor:pointer;transition:transform 0.2s;}
.modal-images img:hover{transform:scale(1.03);}

@media(max-width:768px){
  header{height:90px;padding:0 20px;} 
  .company-logo{height:14px !important;} 
  .logo-text{font-size:14px !important;} 
  
  .container{padding:50px 14px;}
  .top-btn{height:42px;font-size:12px;padding:0 12px;}
  .list-item{padding:14px;gap:10px;flex-direction:column;align-items:flex-start;}
  .title{font-size:14px;line-height:1.4;}
  .modal-title{font-size:18px;}
  .modal-memo{font-size:14px;line-height:1.7;}
  .modal-images img{width:100%;}
}
.modal-box .status { display: inline-block; }

/* 원본 이미지 확대 보기 서브 모달 */
.sub-modal { position:fixed; inset:0; background:rgba(0,0,0,.95); display:none; align-items:center; justify-content:center; z-index:10000; cursor:zoom-out; }
.sub-modal img { max-width:95%; max-height:95vh; border-radius:12px; object-fit:contain; }
</style>
</head>
<body>

<header>
<div class="header-left">
<img src="tiretech-logo.png" class="company-logo">
<a href="index.html" class="logo-text">WORKBOARD</a>
</div>
</header>

<div class="container">
<div class="top-buttons">
<a href="index.html" class="top-btn home-btn">홈으로 가기</a>
<button class="top-btn active" onclick="setFilter('all',this)">전체</button>
<button class="top-btn" onclick="setFilter('done',this)">완료</button>
<button class="top-btn" onclick="setFilter('progress',this)">진행중</button>
<button class="top-btn" onclick="setFilter('pending',this)">미완료</button>
</div>

<div id="result">데이터를 불러오는 중입니다...</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<button class="close-btn" onclick="closeModal()">닫기</button>
<div id="modalContent"></div>
</div>
</div>

<div class="sub-modal" id="subModal" onclick="closeSubModal()">
  <img id="subModalImg" src="" alt="원본 이미지">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl='https://ttunieohxvnhwiikxfzu.supabase.co';
const supabaseKey='sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let allMatchedTasks=[];
let currentFilter='all';

async function getAllTasks(){
  const { data, error } = await supabaseClient
    .from('tasks')
    .select('*')
    .order('id', {ascending:false});
  if(error) console.error("DB 로드 에러:", error);
  return data || [];
}

(async()=>{
  try {
    const params = new URLSearchParams(location.search);
    const mode = params.get('mode');
    const value = params.get('value');
    const categoryParam = params.get('category');

    const tasks = await getAllTasks();

    tasks.forEach(task => {
      let match = false;
      
      if(mode === 'day' && task.date === value) match = true;
      if(mode === 'month' && task.date && task.date.startsWith(value)) match = true;
      if(mode === 'year' && task.date && task.date.startsWith(value)) match = true;
      if(!mode) match = true;

      if(match && categoryParam) {
        if(task.category !== categoryParam) {
          match = false;
        }
      }

      if(match){
        allMatchedTasks.push(task);
      }
    });

    // ✅ 패치: 같은 날짜 안에서도 최근 등록된 데이터가 위로 오도록 보장하고, 
    // 혹시 전체 조회 모드일 경우에도 날짜(date)가 최신인 순서대로 완벽히 정렬합니다.
    allMatchedTasks.sort((a, b) => {
      if (b.date !== a.date) {
        return new Date(b.date) - new Date(a.date);
      }
      return b.id - a.id; 
    });

    renderList();
  } catch (error) {
    console.error("데이터를 가져오는 중 오류가 발생했습니다:", error);
    document.getElementById('result').innerHTML = '<div class="list-item no-data">데이터를 불러오지 못했습니다.</div>';
  }
})();

function renderList(){
  const result = document.getElementById('result');
  let filtered = allMatchedTasks;

  if(currentFilter !== 'all'){
    filtered = allMatchedTasks.filter(task => task.status === currentFilter);
  }

  let html = '';

  filtered.forEach((task)=>{
    const categoryTag = task.category ? `[${task.category}] ` : '';
    html += `
    <div class="list-item" onclick="openModalById(${task.id})">
      <div class="date">${task.date || ''}</div>
      <div class="status ${task.status}">
        ${task.status === 'done' ? '완료' : task.status === 'progress' ? '진행중' : '미완료'}
      </div>
      <div class="title">${categoryTag}${task.title || ''}</div>
    </div>
    `;
  });

  if(!html){
    html = '<div class="list-item no-data">조회 결과가 없습니다.</div>';
  }

  result.innerHTML = html;
}

function setFilter(type, btn){
  currentFilter = type;
  document.querySelectorAll('.top-btn').forEach(el => {
    el.classList.remove('active');
  });
  btn.classList.add('active');
  renderList();
}

function openModalById(id){
  const task = allMatchedTasks.find(t => t.id === id);
  if(!task) return;

  document.getElementById('modal').style.display = 'flex';
  let imgs = '';

  let savedImages = task.images || [];
  if (typeof savedImages === 'string') {
    try { savedImages = JSON.parse(savedImages); } catch(e) { savedImages = []; }
  }

  if(Array.isArray(savedImages) && savedImages.length){
    imgs += '<div class="modal-images">';
    savedImages.forEach(img => {
      if(img) {
        imgs += `<img src="${img}" onclick="showImageInModal('${img}', event)">`;
      }
    });
    imgs += '</div>';
  }

  const categoryTag = task.category ? `[${task.category}] ` : '';

  document.getElementById('modalContent').innerHTML = `
    <div class="date" style="margin-bottom:8px;">${task.date || ''}</div>
    <div class="modal-title"></div>
    <div class="status ${task.status}">
      ${task.status === 'done' ? '완료' : task.status === 'progress' ? '진행중' : '미완료'}
    </div>
    <div class="modal-memo"></div>
    ${imgs}
  `;

  document.querySelector('#modalContent .modal-title').textContent = categoryTag + (task.title || '');
  document.querySelector('#modalContent .modal-memo').textContent = task.memo || '';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

function showImageInModal(imgUrl, event) {
  event.stopPropagation(); 
  document.getElementById('subModalImg').src = imgUrl;
  document.getElementById('subModal').style.display = 'flex';
}

function closeSubModal() {
  document.getElementById('subModal').style.display = 'none';
}
</script>
</body>
</html>
