
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESULT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:linear-gradient(135deg,#6d1bb8,#4310a5);color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.header-left{display:flex;align-items:center;gap:18px;}
.company-logo{height:32px;}
.logo-text{font-size:22px;font-weight:900;color:#ff4fa0;text-decoration:none;}
.container{max-width:1200px;margin:auto;padding:80px 20px;}
.top-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.top-btn{display:inline-flex;align-items:center;justify-content:center;height:50px;padding:0 20px;border-radius:14px;background:rgba(255,255,255,.12);color:#fff;text-decoration:none;font-weight:700;border:none;cursor:pointer;}
.home-btn{background:#ff4fa0;}
.active{background:#ff4fa0;}
.list-item{display:flex;align-items:center;gap:18px;padding:20px 24px;background:rgba(255,255,255,.08);border-radius:18px;margin-bottom:14px;cursor:pointer;}
.date{font-size:15px;color:#cfcfcf;min-width:90px;}
.status{font-size:14px;font-weight:800;padding:8px 14px;border-radius:999px;min-width:88px;text-align:center;}
.done{background:#17381f;color:#74ff9f;}
.progress{background:#4b3c13;color:#ffd95b;}
.pending{background:#4b1f1f;color:#ff7b7b;}
.title{font-size:18px;font-weight:700;line-height:1.5;flex:1;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.modal-box{width:100%;max-width:1000px;max-height:90vh;overflow:auto;background:#181818;border-radius:28px;padding:34px;}
.close-btn{height:50px;padding:0 20px;border:none;border-radius:14px;background:#ff4fa0;color:#fff;font-weight:800;margin-bottom:24px;cursor:pointer;}
.modal-title{font-size:26px;font-weight:900;line-height:1.5;margin-bottom:20px;}
.modal-memo{font-size:17px;line-height:2;margin-top:20px;white-space:pre-wrap;}
.modal-images{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px;}
.modal-images img{
width:220px;
border-radius:18px;
cursor:pointer;
transition:.2s;
}

.modal-images img:active{
transform:scale(.97);
}
  @media(max-width:768px){

header{
height:64px;
padding:0 14px;
}

.company-logo{
height:18px !important;
}

.logo-text{
font-size:14px !important;
}

.container{
padding:50px 14px;
}

.top-btn{
height:42px;
font-size:12px;
padding:0 12px;
}

.list-item{
padding:14px;
gap:10px;
flex-direction:column;
align-items:flex-start;
}

.title{
font-size:14px;
line-height:1.4;
}

.modal-title{
font-size:18px;
}

.modal-memo{
font-size:14px;
line-height:1.7;
}

.modal-images img{
width:100%;
}

}
</style>
</head>
<body>

<header>
<div class="header-left">
<img src="tiretech-logo.png" class="company-logo">
<a href="index.html" class="logo-text">WORKBOARD</a>
</div>
</header>

<div class="container">

<div class="top-buttons">
<a href="index.html" class="top-btn home-btn">홈으로 가기</a>
<button class="top-btn active" onclick="setFilter('all',this)">전체</button>
<button class="top-btn" onclick="setFilter('done',this)">완료</button>
<button class="top-btn" onclick="setFilter('progress',this)">진행중</button>
<button class="top-btn" onclick="setFilter('pending',this)">미완료</button>
</div>

<div id="result"></div>

</div>

<!-- 기존 기본 모달 (유지) -->
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeModal()">닫기</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- 🆕 이미지 크게 보기 전용 모달 (추가) -->
<div class="modal" id="imageModal" onclick="closeImageModal()" style="display:none; background:rgba(0,0,0,.93); z-index:10000;">
  <div style="max-width:90%; max-height:90vh; display:flex; flex-direction:column; align-items:center; gap:16px;" onclick="event.stopPropagation();">
    <img id="expandedImage" src="" style="max-width:100%; max-height:75vh; border-radius:18px; object-fit:contain; box-shadow:0 10px 30px rgba(0,0,0,.5);">
    <button class="close-btn" style="margin-bottom:0;" onclick="closeImageModal()">확대 닫기</button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl='https://ttunieohxvnhwiikxfzu.supabase.co';

const supabaseKey='sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';

const supabaseClient = window.supabase.createClient(
supabaseUrl,
supabaseKey
);

let allMatchedTasks=[];
let currentFilter='all';

async function getAllTasks(){

const { data,error } = await supabaseClient
.from('tasks')
.select('*')
.order('id',{ascending:false});

return data || [];

}



(async()=>{

const params=new URLSearchParams(location.search);

const mode=params.get('mode');

const value=params.get('value');

const tasks=await getAllTasks();

tasks.reverse().forEach(task=>{

let match=true;

if(mode==='day'&&task.date===value)match=true;
if(mode==='month'&&task.date.startsWith(value))match=true;
if(mode==='year'&&task.date.startsWith(value))match=true;

if(match){
allMatchedTasks.push(task);
}

});

renderList();

})();

function renderList(){

const result=document.getElementById('result');

let filtered=allMatchedTasks;

if(currentFilter!=='all'){
filtered=allMatchedTasks.filter(task=>task.status===currentFilter);
}

let html='';

filtered.forEach(task=>{

html+=`
<div class="list-item" onclick='openModal(${JSON.stringify(task)})'>

<div class="date">${task.date}</div>

<div class="status ${task.status}">
${task.status==='done'?'완료':task.status==='progress'?'진행중':'미완료'}
</div>

<div class="title">${task.title}</div>

</div>
`;

});

if(!html){
html='<div class="list-item">조회 결과가 없습니다.</div>';
}

result.innerHTML=html;

}

function setFilter(type,btn){

currentFilter=type;

document.querySelectorAll('.top-btn').forEach(el=>{
el.classList.remove('active');
});

btn.classList.add('active');

renderList();

}

function openModal(task){
  document.getElementById('modal').style.display = 'flex';
  let imgs = '';

  // 💡 데이터가 가끔 문자열 상태의 배열('["url1", "url2"]')로 들어오는 현상 방어
  let imageList = task.images;
  if (typeof imageList === 'string') {
    try { imageList = JSON.parse(imageList); } catch(e) { imageList = []; }
  }

  // 이미지 배열이 존재할 때 렌더링
  if (imageList && imageList.length) {
    imgs += '<div class="modal-images">';
    imageList.forEach(img => {
      if(img) { // 유효한 주소인 경우만 생성
        imgs += `<img src="${img}" onclick="showImageInModal('${img}')" alt="첨부이미지">`;
      }
    });
    imgs += '</div>';
  }

  document.getElementById('modalContent').innerHTML = `
    <div class="date">${task.date}</div>
    <div class="modal-title">${task.title}</div>
    <div class="status ${task.status}">
      ${task.status==='done'?'완료':task.status==='progress'?'진행중':'미완료'}
    </div>
    <div class="modal-memo">${task.memo||''}</div>
    ${imgs}
  `;
}

// 기본 모달 닫기
function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

// 🆕 함수 추가: 이미지를 크게 띄우는 기능
function showImageInModal(imgUrl) {
  document.getElementById('expandedImage').src = imgUrl;
  document.getElementById('imageModal').style.display = 'flex';
}

// 🆕 함수 추가: 큰 이미지 모달을 닫는 기능
function closeImageModal() {
  document.getElementById('imageModal').style.display = 'none';
  document.getElementById('expandedImage').src = '';
}
document.getElementById('modal').style.display='none';
}

</script>
</body>
</html>
