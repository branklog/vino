
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESULT</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    :root {
    --brand-color: #9D8A69;
    --dark-brown: #1B0000;
    --button-color: #9D8A69;
    --button-hover: #8a7758;
    --excel-green: #7A8B5B;
}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{
    background:#120f0d;
    color:#fff;
}
        header{height:80px; background:#f5f1eb; display:flex; align-items:center; padding:0 40px; margin-bottom:30px;}
        @media(max-width:600px){

    header{
        padding:0 20px;
        height:70px;
    }

    .logo-text{
        font-size:18px;
    }

    .company-logo{
        height:28px;
    }
}
        .logo-area{display:flex; align-items:center; gap:15px;}
        .company-logo{height:35px;}
        .logo-text{font-size:22px; font-weight:900; color:var(--brand-color); text-decoration:none;}
        .container { width:100%; max-width:1200px; margin:auto; padding:0 20px 50px 20px; }

.control-box {
    background:#1c1a18;
    padding:16px;
    border-radius:15px;
    margin-bottom:20px;
    border:1px solid #333;
}

        
        .report-range-bar { display:flex; align-items:center; gap:15px; font-weight:bold; flex-wrap: wrap; }
        .report-range-bar input{
    min-width:140px;
}
@media(max-width:600px){

    .report-range-bar{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        align-items:center;
    }

    .report-range-bar label{
        width:100%;
        margin-bottom:5px;
    }

    .report-range-bar input{
        width:calc(50% - 20px);
        min-width:0;
        padding:8px;
        font-size:13px;
    }

    .report-range-bar span{
        width:20px;
        text-align:center;
    }

    .btn-excel{
        width:100%;
        padding:10px;
        margin-top:5px;
    }
}

        input { padding:12px; border-radius:6px; border:none; background:#2a1d1d; color:#fff; }
        .btn-excel { background:var(--excel-green); padding:12px 30px; border-radius:8px; border:none; cursor:pointer; font-weight:700; color:#fff; }
        .search-box{
    margin-bottom:15px;
}

.search-box input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:none;
    background:#1f1a17;
    color:#fff;
    font-size:14px;
    border:1px solid #333;
}

.search-box input::placeholder{
    color:#888;
}

#dateSearch{
    width:100%;
    appearance:none;
    -webkit-appearance:none;
}
        
       .filter-bar {
    display:flex;
    gap:10px;
    margin-bottom:30px;
    overflow-x:auto;
    padding-bottom:10px;

    scrollbar-width:none;
}

.filter-bar::-webkit-scrollbar{
    display:none;
}
  .btn-menu {
    padding:12px 20px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-weight:700;
    color:#fff;
    background:#2a1d1d;
    white-space:nowrap;
    font-size:14px;
    flex-shrink:0;
}
    


.btn-menu.active {
    background:var(--button-color) !important;
}

.btn-menu:hover,
.btn-home:hover,
.btn-excel:hover{
    opacity:0.9;
    transition:0.2s;
}




   .task-item {
    background:#1c1a18;
    padding:16px;
    border-radius:15px;
    margin-bottom:12px;
    display:flex;
    gap:15px;
    cursor:pointer;
    border:1px solid #333;
    align-items:flex-start;
    transition:0.2s;
}

.task-item:active{
    transform:scale(0.98);
}
.task-thumb {
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
    flex-shrink:0;
    background:#2a1d1d;
}

.task-content {
    flex:1;
    min-width:0;
}

.task-title {
    font-size:16px;
    font-weight:700;
    margin-bottom:8px;
    line-height:1.4;
    word-break:break-word;

    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
}

.task-meta {
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
}

.task-date {
    font-size:13px;
    color:#aaa;
}

.status-badge {
    padding:4px 10px;
    border-radius:30px;
    font-size:11px;
    background:rgba(157,138,105,0.15);
    color:#c8b08a;
    font-weight:bold;
}

@media(max-width:600px){

    .btn-menu{
    padding:7px 10px;
    font-size:12px;
}


    
    .task-item{
        padding:14px;
        gap:12px;
    }

    .task-thumb{
        width:55px;
        height:55px;
    }

    .task-title{
        font-size:14px;
    }

    .task-date{
        font-size:12px;
    }
}
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    z-index:1000;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.modal-content {
    background:#1c1a18;
    padding:20px;
    border-radius:20px;
    width:92%;
    max-width:600px;
    position:relative;
    max-height:90vh;
    overflow-y:auto;
}

        
    </style>
</head>
<body>
<header>
  <div class="logo-area">
    <img src="logo.png" class="company-logo">
    <a href="index.html" class="logo-text">WORKBOARD</a>
  </div>
</header>
<div class="container">
    <div class="control-box">
        <div class="report-range-bar">
            <label>리포트 기간 :</label>
            <input type="date" id="start-date"> <span>~</span> <input type="date" id="end-date">
            <button class="btn-excel" onclick="downloadExcel()">📊 엑셀 다운로드</button>
        </div>
    </div>

<div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="작업내용 검색..."
        oninput="searchTasks()">

<input
    type="date"
    id="dateSearch"
    style="
    margin-top:10px;
    width:100%;
    height:48px;
    padding:0 14px;
    border-radius:10px;
    background:#1f1a17;
    color:#fff;
    border:1px solid #333;
    "
    oninput="searchTasks()">

</div>


    
   <div class="filter-bar">
        <button class="btn-menu btn-home" onclick="location.href='index.html'">홈으로 가기</button>
        <button class="btn-menu active" onclick="setFilter(this, '전체')">전체</button>
        <button class="btn-menu" onclick="setFilter(this, '완료')">완료</button>
        <button class="btn-menu" onclick="setFilter(this, '진행중')">진행중</button>
        <button class="btn-menu" onclick="setFilter(this, '미완료')">미완료</button>
    </div>
    <div id="resultList">데이터를 불러오는 중...</div>
</div>
<div id="detailModal" class="modal">
    <div class="modal-content" id="modalData"></div>
</div>
<script>
const client = supabase.createClient('https://ttunieohxvnhwiikxfzu.supabase.co', 'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP');
let allTasks = [];

function getImgUrl(task) {

    if (!task.tasks_images) return null;

    return task.tasks_images;
}

async function getAllTasks() {

    const params = new URLSearchParams(location.search);

    const mode = params.get('mode');
    const value = params.get('value');

    const { data } = await client
      .from('tasks_new')
      .select('*')
      .order('request_date', { ascending:false });

    let tasks = data || [];

    // 일별 조회
    if(mode === 'day'){

        tasks = tasks.filter(
            t => t.request_date === value
        );
    }

    // 월별 조회
    else if(mode === 'month'){

        tasks = tasks.filter(t => {

            if(!t.request_date) return false;

            return t.request_date.startsWith(value);
        });
    }

    // 연도별 조회
    else if(mode === 'year'){

        tasks = tasks.filter(t => {

            if(!t.request_date) return false;

            return t.request_date.startsWith(value);
        });
    }

    allTasks = tasks;

    renderList(allTasks);
}

function renderList(tasks) {
    const list = document.getElementById('resultList');
    list.innerHTML = '';
    if(!tasks || tasks.length === 0) { list.innerHTML = "데이터가 없습니다."; return; }
    tasks.forEach(task => {
        const div = document.createElement('div');
        div.className = 'task-item';
        div.onclick = () => showDetail(task);
        const imgUrl = getImgUrl(task);
 div.innerHTML = `
    ${imgUrl
        ? `<img src="${imgUrl}" class="task-thumb" onerror="this.style.display='none'">`
        : `<div class="task-thumb"></div>`}

    <div class="task-content">

        <div class="task-title">
            ${task.title || ''}
        </div>

        <div class="task-meta">

            <div class="task-date">
                ${task.request_date || ''}
            </div>

         <div class="status-badge">

${task.status === 'done'
? '완료'
: task.status === 'pending'
? '미완료'
: '진행중'}

</div>

        </div>

    </div>
`;

list.appendChild(div);
    });
}

function showDetail(task) {    
    // ⚡ 여기가 task.tasks_images 여야 합니다!
    const imgUrl = getImgUrl(task);
    
    document.getElementById('modalData').innerHTML = `
        <div style="font-size:14px; color:#888;">${task.request_date}</div>        
        <h2 style="margin:10px 0;">${task.title}</h2>        
        <p style="margin:20px 0;">${task.memo || '내용 없음'}</p>        
        
      ${imgUrl ? `
<img 
src="${imgUrl}" 
style="
width:100%;
border-radius:10px;
cursor:pointer;
max-height:70vh;
object-fit:contain;
background:#111;
"
onclick="
document.getElementById('imgPopup').style.display='flex';
document.getElementById('popupImg').src=this.src;
">
` : ''}
        
        <button
onclick="document.getElementById('detailModal').style.display='none'"
style="
margin-top:20px;
background:#9D8A69;
width:100%;
padding:15px;
border:none;
border-radius:8px;
color:#fff;
font-weight:bold;
cursor:pointer;
">
닫기
</button>
    `;    
    document.getElementById('detailModal').style.display = 'flex';
}

function searchTasks() {

    const keyword =
        document.getElementById('searchInput')
        .value
        .toLowerCase();
    
    const searchDate =
        document.getElementById('dateSearch')
        .value;

    const filtered = allTasks.filter(task => {

        const title =
            (task.title || '').toLowerCase();

        const memo =
            (task.memo || '').toLowerCase();

        const matchKeyword =
            title.includes(keyword)
            || memo.includes(keyword);

        const matchDate =
            !searchDate
            || task.request_date === searchDate;

        return matchKeyword && matchDate;

    });

    renderList(filtered);

}

    
function setFilter(btn, filter) {

    document.querySelectorAll('.btn-menu')
      .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    let filtered = [...allTasks];

    // 완료
  if(filter === '완료'){

    filtered = filtered.filter(
        t => t.status === 'done'
    );
}

// 진행중
else if(filter === '진행중'){

    filtered = filtered.filter(
        t => t.status === 'progress'
    );
}

// 미완료
else if(filter === '미완료'){

    filtered = filtered.filter(
        t => t.status === 'pending'
    );
}

    // 검색 유지
    const keyword =
        document.getElementById('searchInput')
        .value
        .toLowerCase();

    if(keyword){

        filtered = filtered.filter(task => {

            const title =
                (task.title || '').toLowerCase();

            const memo =
                (task.memo || '').toLowerCase();

            return title.includes(keyword)
                || memo.includes(keyword);

        });
    }

    renderList(filtered);
}


function downloadExcel() {
    const start = document.getElementById('start-date').value;
    const end = document.getElementById('end-date').value;
    const excelTasks = allTasks.filter(t => t.request_date >= start && t.request_date <= end);
    const ws = XLSX.utils.json_to_sheet(excelTasks);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tasks");
    XLSX.writeFile(wb, "업무내역.xlsx");
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('detailModal')
.addEventListener('click', function(e){

    if(e.target === this){
        this.style.display = 'none';
    }

});
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('start-date').value = today;
    document.getElementById('end-date').value = today;
    getAllTasks();
});
</script>
<div
id="imgPopup"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
z-index:99999;
justify-content:center;
align-items:center;
padding:20px;
"
onclick="this.style.display='none'">

<img
id="popupImg"
style="
max-width:100%;
max-height:100%;
object-fit:contain;
border-radius:10px;
">

</div>

    
</body>
</html>
