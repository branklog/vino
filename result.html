<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비노파라다이스 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:#111;color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.header-left{display:flex;align-items:center;gap:18px;}
.company-logo{height:30px;}
.logo-text{font-size:22px;font-weight:900;color:#9D8A69;text-decoration:none;}
.container{max-width:1100px;margin:auto;padding:80px 20px;}
.card{background:rgba(255,255,255,.08);padding:40px;border-radius:24px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);}
.home-btn{display:inline-flex;align-items:center;justify-content:center;height:54px;padding:0 24px;border-radius:14px;background:#9D8A69;color:#fff;text-decoration:none;font-weight:800;margin-bottom:24px;}
.group{margin-bottom:22px;}
label{display:block;margin-bottom:10px;font-weight:700;}
input,textarea,select{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;color:#fff;font-size:15px;outline:none;}
.main-btn{height:58px;border:none;border-radius:14px;background:#9D8A69;color:#fff;font-weight:800;padding:0 24px;cursor:pointer;margin-right:10px;margin-top:10px;}
.task{background:rgba(255,255,255,.05);padding:20px;border-radius:18px;margin-bottom:18px;}
.excel-box{border:2px dashed #9D8A69;padding:20px;margin-bottom:20px;border-radius:14px;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="dagil-logo.png" class="company-logo">
    <a href="index.html" class="logo-text">비노파라다이스</a>
  </div>
</header>

<div class="container">
  <a href="index.html" class="home-btn">홈으로 가기</a>
  <div class="card">
    <div class="excel-box">
      <p>📊 엑셀 서류로 한번에 대량 업로드하기</p>
      <input type="file" id="excelFile">
    </div>
    <div id="tasks"></div>
    <button class="main-btn" onclick="addTask()">+ 업무 직접 추가</button>
    <button class="main-btn" onclick="saveAll()">업무 저장</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 기존 const supabase = window.supabase.createClient(...) 부분을 삭제하고 아래로 교체하세요!

const supabaseUrl = 'https://ttunieohxvnhwiikxfzu.supabase.co';
const supabaseKey = 'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';

// ⚡ window를 빼고 supabase.createClient로 직접 연결합니다.
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

function addTask(data = {}) {
  const div = document.createElement('div');
  div.className = 'task';
  div.innerHTML = `
    <div class="group"><label>의뢰일</label><input type="date" class="task-date" value="${data.request_date || ''}"></div>
    <div class="group"><label>업무구분</label>
      <select class="category">
        <option value="웹" ${data.category === '웹' ? 'selected' : ''}>웹</option>
        <option value="인쇄" ${data.category === '인쇄' ? 'selected' : ''}>인쇄</option>
      </select>
    </div>
    <div class="group"><label>작업내용</label><input type="text" class="title" value="${data.title || ''}"></div>
    <div class="group"><label>완료일</label><input type="date" class="task-complete" value="${data.complete_date || ''}"></div>
    <div class="group"><label>상태</label>
      <select class="status">
        <option value="done" ${data.status === 'done' ? 'selected' : ''}>완료</option>
        <option value="progress" ${data.status === 'progress' ? 'selected' : ''}>진행중</option>
        <option value="pending" ${data.status === 'pending' ? 'selected' : ''}>미완료</option>
      </select>
    </div>
  `;
  document.getElementById('tasks').appendChild(div);
}

async function saveAll() {
  const tasks = document.querySelectorAll('.task');
  for (const task of tasks) {
    // ⚡ 사장님의 DB 테이블 구조(id, title, memo, images, request_date, complete_date, category)에 완벽 일치
    const data = {
      title: task.querySelector('.title').value,
      memo: task.querySelector('.memo').value,
      request_date: task.querySelector('.task-date').value || null,
      complete_date: task.querySelector('.task-complete').value || null,
      category: task.querySelector('.category').value,
      images: null // images는 테이블에 있으니 null로 처리
    };
    
    // 테이블명 tasks_new에 정확히 전송
    const { error } = await supabase.from('tasks_new').insert([data]);
    
    if (error) {
      console.error('저장 실패:', error);
      alert('저장 중 오류 발생: ' + error.message);
      return;
    }
  }
  alert('저장 완료!');
  location.reload();
}
addTask();
</script>
</body>
</html>
