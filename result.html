<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 조회 결과</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#f5f5f7;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:70px 20px;
}

.title{
  margin-bottom:40px;
}

.title h1{
  font-size:42px;
  margin-bottom:12px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:30px;
  margin-bottom:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.card h2{
  margin-bottom:20px;
}

.task{
  padding:18px 0;
  border-bottom:1px solid #eee;
}

.task:last-child{
  border-bottom:none;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  padding:8px 14px;
  border-radius:30px;
  font-size:13px;
  font-weight:700;
}

.done{
  background:#d4edda;
  color:#155724;
}

.working{
  background:#d1ecf1;
  color:#0c5460;
}

.waiting{
  background:#fff3cd;
  color:#856404;
}

.memo{
  margin-top:14px;
  background:#faf7ff;
  padding:16px;
  border-radius:16px;
  line-height:1.8;
}

.empty{
  background:#fff;
  padding:60px;
  border-radius:24px;
  text-align:center;
}
</style>
</head>
<body>

<div class="container">

  <div class="title">
    <h1 id="dateTitle"></h1>
  </div>

  <div id="result"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const date = params.get('date');

document.getElementById('dateTitle').innerText =
date + ' 업무 조회 결과';

const data = JSON.parse(localStorage.getItem('workData')) || {};

const result = document.getElementById('result');

if(!data[date]){

  result.innerHTML = `
    <div class="empty">
      해당 날짜의 업무가 없습니다.
    </div>
  `;

}else{

  const grouped = {};

  data[date].forEach(item => {

    if(!grouped[item.category]){
      grouped[item.category] = [];
    }

    grouped[item.category].push(item);

  });

  let html = '';

  for(const category in grouped){

    html += `
      <div class="card">
        <h2>${category}</h2>
    `;

    grouped[category].forEach(item => {

      html += `
        <div class="task">

          <div class="top">
            <div>${item.title}</div>
            <div class="badge ${item.status}">
              ${
                item.status === 'done'
                ? '완료'
                : item.status === 'working'
                ? '진행중'
                : '대기'
              }
            </div>
          </div>

          ${
            item.memo
            ? `<div class="memo">${item.memo}</div>`
            : ''
          }

        </div>
      `;

    });

    html += `</div>`;

  }

  result.innerHTML = html;
}
</script>

</body>
</html>
