<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESULT</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:#111;color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.header-left{display:flex;align-items:center;gap:18px;}.company-logo{height:30px;}.logo-text{font-size:22px;font-weight:900;color:#9D8A69;text-decoration:none;}.container{max-width:1200px;margin:auto;padding:80px 20px;}.report-range-bar { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.05); padding:16px 24px; border-radius:18px; border:1px solid rgba(255,255,255,.1); margin-bottom:24px; flex-wrap:wrap; }button { height:45px; padding:0 20px; border-radius:10px; background:#9D8A69; color:#fff; border:none; cursor:pointer; font-weight:700; }input { padding:10px; border-radius:8px; border:none; background:#333; color:#fff; }.filter-bar { display:flex; gap:10px; margin-bottom:20px; }.task-item { background:rgba(255,255,255,.05); padding:20px; border-radius:18px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <img src="dagil-logo.png" class="company-logo">
    <a href="index.html" class="logo-text">비노파라다이스</a>
  </div>
  <a href="index.html" style="margin-left:auto; text-decoration:none; color:#111; font-weight:800;">홈으로 가기</a>
</header>

<div class="container">
  <div class="report-range-bar">
    <label>리포트 기간</label>
    <input type="date" id="start-date"> <span>~</span> <input type="date" id="end-date">
    <button onclick="downloadExcel()">📊 엑셀 다운로드</button>
  </div>
  <div id="resultList">불러오는 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 1. API 연결 설정 (URL과 키 확인 완료)
const supabaseUrl = 'https://ttunieohxvnhwiikxfzu.supabase.co';
const supabaseKey = 'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP';

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

let allMatchedTasks = [];

async function getAllTasks() {
  // ⚡ 테이블명을 tasks_new로 정확히 변경
  const { data, error } = await client.from('tasks_new').select('*').order('id', {ascending: false});
  if(error) { console.error(error); return; }
  allMatchedTasks = data || [];
  renderList(allMatchedTasks);
}

function renderList(tasks) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  tasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task-item';
    div.innerHTML = `
      <div>
        <div style="font-size:12px; color:#aaa;">${task.request_date || ''}</div>
        <div style="font-size:18px; font-weight:800;">${task.title || ''}</div>
        <div style="font-size:14px; color:#ddd;">메모: ${task.memo || ''}</div>
      </div>
      <div>${task.category || ''}</div>
    `;
    list.appendChild(div);
  });
}

function downloadExcel() {
  const start = document.getElementById('start-date').value;
  const end = document.getElementById('end-date').value;
  if(!start || !end) { alert('기간을 선택해주세요.'); return; }
  
  const excelTasks = allMatchedTasks.filter(t => t.request_date >= start && t.request_date <= end);
  if(excelTasks.length === 0) { alert('데이터가 없습니다.'); return; }

  const excelData = [['의뢰일', '업무구분', '제목', '메모', '완료일']];
  excelTasks.forEach(t => excelData.push([t.request_date, t.category, t.title, t.memo, t.complete_date]));
  
  const ws = XLSX.utils.aoa_to_sheet(excelData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tasks");
  XLSX.writeFile(wb, "비노파라다이스_업무내역.xlsx");
}

getAllTasks();
</script>
</body>
</html>
