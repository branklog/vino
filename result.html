
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESULT</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --brand-color: #9D8A69; --btn-red: #ff0000; --excel-green: #28a745; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
        body{background:#111;color:#fff;}
        header{height:80px; background:#fff; display:flex; align-items:center; padding:0 40px; margin-bottom:30px;}
        .logo-area{display:flex; align-items:center; gap:15px;}
        .company-logo{height:35px;}
        .logo-text{font-size:22px; font-weight:900; color:var(--brand-color); text-decoration:none;}
        .container { width:100%; max-width:1200px; margin:auto; padding:0 20px 50px 20px; }
        .control-box { background:#222; padding:25px; border-radius:15px; margin-bottom:20px; border:1px solid #333; }
        .report-range-bar { display:flex; align-items:center; gap:15px; font-weight:bold; flex-wrap: wrap; }
        input { padding:12px; border-radius:6px; border:none; background:#333; color:#fff; }
        .btn-excel { background:var(--excel-green); padding:12px 30px; border-radius:8px; border:none; cursor:pointer; font-weight:700; color:#fff; }
        .filter-bar { display:flex; gap:10px; margin-bottom:30px; overflow-x: auto; padding-bottom: 10px; }
        .btn-menu { padding:12px 30px; border-radius:8px; border:none; cursor:pointer; font-weight:700; color:#fff; background:#333; white-space: nowrap; }
        .btn-home { background:var(--btn-red) !important; }
        .btn-menu.active { background:var(--btn-red) !important; }
        .task-item { background:#222; padding:20px; border-radius:15px; margin-bottom:12px; display:flex; align-items:center; gap:20px; cursor:pointer; border:1px solid #333; }
        .task-thumb { width:60px; height:60px; border-radius:8px; object-fit:cover; flex-shrink:0; background:#333; }
        .status-badge { padding:4px 12px; border-radius:4px; font-size:12px; background:#1e4620; color:#4caf50; font-weight:bold; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:#222; padding:30px; border-radius:20px; width:90%; max-width:600px; position:relative; }
        @media(max-width:600px) { .task-item { gap: 10px; padding: 15px; } .task-thumb { width: 45px; height: 45px; } }
    </style>
</head>
<body>
<header>
  <div class="logo-area">
    <img src="dagil-logo.png" class="company-logo">
    <a href="index.html" class="logo-text">WORKBOARD</a>
  </div>
</header>
<div class="container">
    <div class="control-box">
        <div class="report-range-bar">
            <label>리포트 기간 :</label>
            <input type="date" id="start-date"> <span>~</span> <input type="date" id="end-date">
            <button class="btn-excel" onclick="downloadExcel()">📊 엑셀 다운로드</button>
        </div>
    </div>
    <div class="filter-bar">
        <button class="btn-menu btn-home" onclick="location.href='index.html'">홈으로 가기</button>
        <button class="btn-menu active" onclick="setFilter(this, '전체')">전체</button>
        <button class="btn-menu" onclick="setFilter(this, '완료')">완료</button>
        <button class="btn-menu" onclick="setFilter(this, '진행중')">진행중</button>
        <button class="btn-menu" onclick="setFilter(this, '미완료')">미완료</button>
    </div>
    <div id="resultList">데이터를 불러오는 중...</div>
</div>
<div id="detailModal" class="modal">
    <div class="modal-content" id="modalData"></div>
</div>
<script>
const client = supabase.createClient('https://ttunieohxvnhwiikxfzu.supabase.co', 'sb_publishable_mdIZt_b1mzvuRoBp3eLYHA_MmBJfIoP');
let allTasks = [];

function getImgUrl(task) {
    // ⚡ 여기가 'images'가 아니라 'tasks_images'여야 합니다!
    if (!task.tasks_images) return null;
    return Array.isArray(task.tasks_images) ? task.tasks_images[0] : task.tasks_images;
}

async function getAllTasks() {
    const { data } = await client.from('tasks_new').select('*').order('request_date', {ascending: false});
    allTasks = data || [];
    renderList(allTasks);
}

function renderList(tasks) {
    const list = document.getElementById('resultList');
    list.innerHTML = '';
    if(!tasks || tasks.length === 0) { list.innerHTML = "데이터가 없습니다."; return; }
    tasks.forEach(task => {
        const div = document.createElement('div');
        div.className = 'task-item';
        div.onclick = () => showDetail(task);
        const imgUrl = getImgUrl(task);
        div.innerHTML = `
            ${imgUrl ? `<img src="${imgUrl}" class="task-thumb" onerror="this.style.display='none'">` : `<div class="task-thumb"></div>`}
            <div style="width:120px; font-size:14px; color:#ccc;">${task.request_date || ''}</div>
            <div class="status-badge">완료</div>
            <div style="flex-grow:1; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${task.title || ''}</div>
        `;
        list.appendChild(div);
    });
}

function showDetail(task) {    
    // ⚡ 여기가 task.tasks_images 여야 합니다!
    const imgUrl = task.tasks_images || ''; 
    
    document.getElementById('modalData').innerHTML = `
        <div style="font-size:14px; color:#888;">${task.request_date}</div>        
        <h2 style="margin:10px 0;">${task.title}</h2>        
        <p style="margin:20px 0;">${task.memo || '내용 없음'}</p>        
        
        ${imgUrl ? `<img src="${imgUrl}" style="width:100%; border-radius:10px; cursor:pointer;" onclick="window.open(this.src)">` : ''}
        
        <button onclick="document.getElementById('detailModal').style.display='none'" style="...">닫기</button>    
    `;    
    document.getElementById('detailModal').style.display = 'flex';
}

function setFilter(btn, filter) {
    document.querySelectorAll('.btn-menu').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList(filter === '전체' ? allTasks : allTasks.filter(t => t.status === filter));
}

function downloadExcel() {
    const start = document.getElementById('start-date').value;
    const end = document.getElementById('end-date').value;
    const excelTasks = allTasks.filter(t => t.request_date >= start && t.request_date <= end);
    const ws = XLSX.utils.json_to_sheet(excelTasks);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tasks");
    XLSX.writeFile(wb, "업무내역.xlsx");
}

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('start-date').value = today;
    document.getElementById('end-date').value = today;
    getAllTasks();
});
</script>
</body>
</html>
